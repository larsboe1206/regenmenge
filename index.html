<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Regenmesser</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 50px;
}

.box {
    font-size: 30px;
    padding: 20px;
}
</style>

</head>
<body>

<h1>🌧 Regenmesser</h1>

<div class="box">
Niederschlag der letzten 7 Tage:
<br><br>
<span id="regen">Lade...</span>
</div>

<script>

// Airolo (Schweiz)
let latitude = 46.52961;
let longitude = 8.60868;

// Heutiges Datum
let heute = new Date();

// Vor 7 Tagen
let letzteWoche = new Date();
letzteWoche.setDate(heute.getDate() - 7);

// Format YYYY-MM-DD
function formatDatum(datum) {
    return datum.toISOString().split("T")[0];
}

let start = formatDatum(letzteWoche);
let ende = formatDatum(heute);

fetch(`https://archive-api.open-meteo.com/v1/archive?latitude=${latitude}&longitude=${longitude}&start_date=${start}&end_date=${ende}&daily=precipitation_sum&timezone=Europe/Berlin`)
.then(response => response.json())
.then(data => {

    let werte = data.daily.precipitation_sum;

    // Niederschlag der letzten 7 Tage aufsummieren
    let summe = werte.reduce((a, b) => a + b, 0);

    document.getElementById("regen").innerHTML =
        summe.toFixed(1) + " l/m²";

})
.catch(error => {

    document.getElementById("regen").innerHTML = "Fehler beim Laden";
    console.error(error);

});

</script>

</body>
</html>
