<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Regenmesser</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 50px;
}

.box {
    font-size: 22px;
    padding: 20px;
}

.tag {
    margin: 10px;
}
</style>

</head>

<body>

<h1>🌧 Regenmesser Airolo</h1>

<div class="box">

<span id="regen">Lade Daten...</span>

</div>


<script>

// Airolo Schweiz
let latitude = 46.52961;
let longitude = 8.60868;


// heutiges Datum
let heute = new Date();


// 7 Tage zurück
let letzteWoche = new Date();
letzteWoche.setDate(heute.getDate() - 7);


// Datum formatieren
function datumFormat(datum) {
    return datum.toISOString().split("T")[0];
}


let start = datumFormat(letzteWoche);
let ende = datumFormat(heute);


// Wochentage
let tage = [
    "Sonntag",
    "Montag",
    "Dienstag",
    "Mittwoch",
    "Donnerstag",
    "Freitag",
    "Samstag"
];


fetch(
`https://archive-api.open-meteo.com/v1/archive?latitude=${latitude}&longitude=${longitude}&start_date=${start}&end_date=${ende}&daily=precipitation_sum&timezone=Europe/Berlin`
)

.then(response => response.json())

.then(data => {


    let niederschlag = data.daily.precipitation_sum;
    let datum = data.daily.time;


    let ausgabe = "";

    let gesamt = 0;


    for(let i = 0; i < niederschlag.length; i++) {


        let tag = new Date(datum[i]);

        let wochentag = tage[tag.getDay()];


        let menge = niederschlag[i];


        gesamt += menge;


        ausgabe += `
        <div class="tag">
        ${wochentag} (${datum[i]}):
        <b>${menge.toFixed(1)} l/m²</b>
        </div>
        `;

    }


    ausgabe += `
    <hr>
    Gesamt letzte 7 Tage:
    <b>${gesamt.toFixed(1)} l/m²</b>
    `;


    document.getElementById("regen").innerHTML = ausgabe;


})


.catch(error => {

    document.getElementById("regen").innerHTML =
    "Fehler beim Laden";

    console.error(error);

});


</script>

</body>
</html>
