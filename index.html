<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<title>Regenmesser</title>

<style>

body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 50px;
}

.box {
    font-size: 22px;
    padding: 20px;
}

.tag {
    margin: 12px;
}

</style>

</head>


<body>

<h1>🌧 Regenmesser Airolo</h1>

<div class="box" id="regen">
Lade Daten...
</div>


<script>


// Nürnberg
let latitude = 49.4521;
let longitude = 11.0767;


// Anzahl Tage zurück
let tageZurueck = 6;


// heutiges Datum
let heute = new Date();


// Startdatum berechnen
let startDatum = new Date();
startDatum.setDate(heute.getDate() - tageZurueck);


// Datum in YYYY-MM-DD umwandeln
function datumFormatieren(datum) {

    return datum.toISOString().split("T")[0];

}


let start = datumFormatieren(startDatum);
let ende = datumFormatieren(heute);


// Wochentage
let wochentage = [
    "Sonntag",
    "Montag",
    "Dienstag",
    "Mittwoch",
    "Donnerstag",
    "Freitag",
    "Samstag"
];



// Open-Meteo Archiv API
fetch(
`https://archive-api.open-meteo.com/v1/archive?latitude=${latitude}&longitude=${longitude}&start_date=${start}&end_date=${ende}&daily=precipitation_sum&timezone=Europe/Berlin`
)


.then(response => response.json())


.then(data => {


    let regenwerte = data.daily.precipitation_sum;
    let datumswerte = data.daily.time;


    let ausgabe = "";

    let gesamt = 0;



    for(let i = 0; i < regenwerte.length; i++) {


        let datum = new Date(datumswerte[i]);

        let tag = wochentage[datum.getDay()];


        let regen = regenwerte[i];


        gesamt += regen;



        ausgabe += `

        <div class="tag">

        ${tag}
        (${datumswerte[i]})
        :
        <b>${regen.toFixed(1)} l/m²</b>

        </div>

        `;

    }



    ausgabe += `

    <hr>

    <div>

    <b>
    Gesamt letzte 7 Tage:
    ${gesamt.toFixed(1)} l/m²
    </b>

    </div>

    `;



    document.getElementById("regen").innerHTML = ausgabe;


})



.catch(error => {


    document.getElementById("regen").innerHTML =
    "Fehler beim Laden der Wetterdaten";


    console.error(error);


});


</script>


</body>

</html>
